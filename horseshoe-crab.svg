<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" role="img" aria-labelledby="title desc">
  <title id="title">金門鱟</title>
  <desc id="desc">具有馬蹄形背甲、腹部甲片與細長尾劍的鱟卡通圖示</desc>
  <defs>
    <linearGradient id="carapace" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#b98a43"/>
      <stop offset="0.55" stop-color="#8c642f"/>
      <stop offset="1" stop-color="#68461f"/>
    </linearGradient>
    <linearGradient id="abdomen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9c7136"/>
      <stop offset="1" stop-color="#64451f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#2e3b28" flood-opacity=".22"/>
    </filter>
  </defs>
  <ellipse cx="160" cy="330" rx="88" ry="14" fill="#315c43" opacity=".18"/>
  <g filter="url(#shadow)">
    <!-- 馬蹄形頭胸甲 -->
    <path d="M160 24C91 24 43 72 43 137c0 48 25 84 61 101 16 8 35 12 56 12s40-4 56-12c36-17 61-53 61-101C277 72 229 24 160 24Z" fill="url(#carapace)" stroke="#4f3519" stroke-width="8" stroke-linejoin="round"/>
    <!-- 前緣與中央脊 -->
    <path d="M63 116c25-42 59-62 97-62s72 20 97 62M160 46v190" fill="none" stroke="#d1a25b" stroke-width="6" stroke-linecap="round" opacity=".42"/>
    <!-- 複眼 -->
    <ellipse cx="105" cy="118" rx="10" ry="15" fill="#2b281e"/>
    <ellipse cx="215" cy="118" rx="10" ry="15" fill="#2b281e"/>
    <circle cx="102" cy="113" r="3" fill="#fff5cf"/>
    <circle cx="212" cy="113" r="3" fill="#fff5cf"/>
    <!-- 腹部甲片 -->
    <path d="M104 217c13 13 32 20 56 20s43-7 56-20l-9 70c-14 13-29 19-47 19s-33-6-47-19Z" fill="url(#abdomen)" stroke="#4f3519" stroke-width="7" stroke-linejoin="round"/>
    <path d="M120 244h80M116 265h88M123 285h74" fill="none" stroke="#c89650" stroke-width="4" opacity=".55"/>
    <!-- 腹部棘刺 -->
    <path d="M110 234 88 246M106 254 82 268M210 234l22 12M214 254l24 14" fill="none" stroke="#65451f" stroke-width="8" stroke-linecap="round"/>
    <!-- 尾劍 -->
    <path d="M160 302 149 347l11 8 11-8Z" fill="#765126" stroke="#4f3519" stroke-width="6" stroke-linejoin="round"/>
  </g>
</svg>
